databaseChangeLog:
  - changeSet:
      id: 001-create-payment-table
      author: developer
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: from_iban
                  type: VARCHAR(34)
                  constraints:
                    nullable: false

              - column:
                  name: to_iban
                  type: VARCHAR(34)
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: error_message
                  type: VARCHAR(500)

              - column:
                  name: external_payment_id
                  type: VARCHAR(100)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_payments_from_iban
            tableName: payments
            columns:
              - column:
                  name: from_iban

        - createIndex:
            indexName: idx_payments_status
            tableName: payments
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_payments_created_at
            tableName: payments
            columns:
              - column:
                  name: created_at