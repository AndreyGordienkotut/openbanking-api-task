spring:
  application:
    name: openbanking-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    liquibase:
      url: ${DB_URL}
      user: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      change-log: classpath:db/changelog/db.changelog-master.yaml
      enabled: true
server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
logging:
  level:
    com.banking.openbanking_api: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
external:
  bank:
    base-url: http://localhost:8080/mock-bank